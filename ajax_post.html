<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="ajax_post.css">
</head>
<body>

  <!-- REGISTRATION FORM -->
  <div class="form-card">
    <h4 class="mb-4 text-center">User Registration</h4>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Enter your name"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="Enter email"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" id="phone" class="form-control" placeholder="Enter phone number"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Course</label>
      <select id="course" class="form-select">
        <option value="">-- Select Course --</option>
        <option>WAD</option>
        <option>DBMS</option>
        <option>AI</option>
        <option>CN</option>
      </select>
    </div>

    <!-- Submit button triggers our JS function -->
    <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>

    <!-- Success/Error message shown after submission -->
    <div id="statusMsg" class="alert mt-3"></div>
  </div>

  <!-- TABLE TO DISPLAY REGISTERED USERS -->
  <div class="user-table-wrapper">
    <h5 class="mb-3">Registered Users</h5>
    <table class="table table-bordered table-hover" id="userTable">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Course</th>
        </tr>
      </thead>
      <tbody id="userBody">
        <!-- Rows are added dynamically by JS -->
      </tbody>
    </table>
    <p id="noData" class="text-muted">No users registered yet.</p>
  </div>

  <script>
    /*
      HOW THIS WORKS:
      1. User fills the form and clicks Register.
      2. registerUser() reads the input values.
      3. We store the data in localStorage (so it persists on refresh).
      4. We simulate an AJAX POST using fetch() — in real projects you'd send
         this to a server like Node.js/Express. Here we log the "response".
      5. We display all stored users in the table.
    */

    // Load existing users from localStorage when page opens
    window.onload = function () {
      displayUsers();
    };

    function registerUser() {
      // Step 1: Read values from inputs
      const name   = document.getElementById("name").value.trim();
      const email  = document.getElementById("email").value.trim();
      const phone  = document.getElementById("phone").value.trim();
      const course = document.getElementById("course").value;

      // Basic validation
      if (!name || !email || !phone || !course) {
        showMsg("Please fill all fields!", "danger");
        return;
      }

      // Step 2: Create a user object
      const user = { name, email, phone, course };

      // Step 3: Save to localStorage (browser storage)
      let users = getUsers();       // get existing array
      users.push(user);             // add new user
      localStorage.setItem("registeredUsers", JSON.stringify(users)); // save back

      // Step 4: Simulate AJAX POST using fetch()
      // In real life, replace the URL with your Node.js server endpoint
      simulateAjaxPost(user);

      // Step 5: Show success and update table
      showMsg("User registered successfully!", "success");
      clearForm();
      displayUsers();
    }

    function simulateAjaxPost(user) {
      /*
        Real AJAX POST example (uncomment when you have a server):

        fetch("http://localhost:3000/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
        })
        .then(res => res.json())
        .then(data => console.log("Server responded:", data))
        .catch(err => console.error("Error:", err));
      */

      // For now we just log it — simulates the POST
      console.log("AJAX POST sent:", JSON.stringify(user));
      console.log("(In real project, this goes to your Express server)");
    }

    // Reads all users from localStorage
    function getUsers() {
      const data = localStorage.getItem("registeredUsers");
      return data ? JSON.parse(data) : [];
    }

    // Renders the users array as table rows
    function displayUsers() {
      const users = getUsers();
      const tbody = document.getElementById("userBody");
      const noData = document.getElementById("noData");

      tbody.innerHTML = ""; // clear existing rows

      if (users.length === 0) {
        noData.style.display = "block";
        return;
      }
      noData.style.display = "none";

      users.forEach((user, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.phone}</td>
            <td>${user.course}</td>
          </tr>
        `;
      });
    }

    // Shows a Bootstrap alert message
    function showMsg(msg, type) {
      const el = document.getElementById("statusMsg");
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = "block";
      setTimeout(() => el.style.display = "none", 3000);
    }

    // Clears the form inputs
    function clearForm() {
      ["name", "email", "phone", "course"].forEach(id => {
        document.getElementById(id).value = "";
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
